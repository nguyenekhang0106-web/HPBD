<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chúc mừng sinh nhật! 🎂</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background-color: #ffdde6;
        background-image:
          linear-gradient(
            45deg,
            rgba(255, 194, 209, 0.4) 25%,
            transparent 25%,
            transparent 75%,
            rgba(255, 194, 209, 0.4) 75%,
            rgba(255, 194, 209, 0.4)
          ),
          linear-gradient(
            45deg,
            rgba(255, 194, 209, 0.4) 25%,
            transparent 25%,
            transparent 75%,
            rgba(255, 194, 209, 0.4) 75%,
            rgba(255, 194, 209, 0.4)
          );
        background-size: 24px 24px;
        background-position:
          0 0,
          12px 12px;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      /* BONG BÓNG BAY NỀN */
      .floating-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
      }
      .floating-bg span {
        position: absolute;
        bottom: -80px;
        animation: floatUp linear infinite;
        opacity: 0;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        90% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-120vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* KHÓA NHẬP MÃ */
      .card-container {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        padding: 40px;
        box-shadow:
          0 0 0 10px rgba(255, 255, 255, 0.15),
          0 25px 60px rgba(230, 90, 140, 0.25);
        display: flex;
        gap: 60px;
        width: 95%;
        max-width: 850px;
        min-height: 450px;
        position: relative;
        z-index: 10;
        transition:
          opacity 0.6s ease,
          transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .image-section {
        flex: 1;
        display: flex;
      }
      .image-section img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      }
      .lock-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .bday-title {
        font-family: "Dancing Script", cursive;
        font-size: 45px;
        color: #ff1493;
        margin-bottom: 5px;
        text-shadow: 2px 2px 5px rgba(255, 20, 147, 0.2);
        line-height: 1;
        text-align: center;
      }
      .bday-subtitle {
        font-size: 15px;
        color: #d81b60;
        font-weight: 700;
        margin-bottom: 20px;
        text-align: center;
      }
      .heart-icon {
        width: 45px;
        height: 45px;
        fill: #ff1493;
        margin-bottom: 15px;
        animation: heartbeat 1.5s infinite;
        cursor: pointer;
        transition: transform 0.2s;
        transform-origin: center;
      }
      .heart-icon:active {
        animation: none;
        transform: scale(0.85);
      }
      @keyframes heartbeat {
        0%,
        100% {
          transform: scaleX(1.05) scaleY(1);
        }
        50% {
          transform: scaleX(1.2) scaleY(1.15);
        }
      }
      .dots-container {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #ff1493;
        background: transparent;
        transition: all 0.2s ease;
      }
      .dot.active {
        background: #ff1493;
      }
      .numpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      .num-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: #d81b60;
        font-size: 22px;
        font-weight: 700;
        font-family: "Quicksand", sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .num-btn:hover,
      .num-btn:active {
        background: rgba(255, 255, 255, 0.95);
        transform: scale(0.95);
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
      }
      .num-btn.empty {
        background: transparent;
        cursor: default;
      }
      .num-btn.delete svg {
        width: 30px;
        height: 30px;
        fill: #d81b60;
        transition: fill 0.2s;
      }
      .num-btn.delete:hover svg {
        fill: #ff1493;
      }

      .shake {
        animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
      @keyframes shake {
        10%,
        90% {
          transform: translate3d(-2px, 0, 0);
        }
        20%,
        80% {
          transform: translate3d(4px, 0, 0);
        }
        30%,
        50%,
        70% {
          transform: translate3d(-6px, 0, 0);
        }
        40%,
        60% {
          transform: translate3d(6px, 0, 0);
        }
      }

      /* GỢI Ý MÃ */
      .hint-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
      .hint-box {
        background: white;
        border-radius: 24px;
        padding: 40px 50px;
        position: relative;
        box-shadow: 0 20px 50px rgba(255, 117, 140, 0.3);
        text-align: center;
        animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      @keyframes zoomIn {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .close-hint {
        position: absolute;
        top: -15px;
        right: -15px;
        background: #ff1493;
        color: white;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border: 3px solid white;
        box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        transition: transform 0.2s;
        z-index: 10;
      }
      .close-hint:hover {
        transform: scale(1.1) rotate(90deg);
      }
      .hint-title {
        color: #d81b60;
        font-weight: 700;
        font-size: 20px;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .scratch-container {
        position: relative;
        width: 230px;
        height: 75px;
        margin: 0 auto;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
      }
      .hint-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        color: #e91e63;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding-left: 12px;
        user-select: none;
      }
      #scratch-pad {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        z-index: 2;
      }

      /* MENU CHỨC NĂNG */
      .menu-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        width: 90%;
        max-width: 800px;
      }
      .menu-item {
        background: #ffffff;
        border: 2px solid rgba(255, 182, 193, 0.4);
        border-radius: 35px;
        width: 100%;
        height: 200px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: 0 15px 35px rgba(255, 182, 193, 0.2);
        cursor: pointer;
        opacity: 0;
        transform: translateY(40px) scale(0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .menu-item:hover {
        transform: scale(1.08) translateY(-10px);
        box-shadow:
          0 25px 45px rgba(255, 105, 180, 0.35),
          0 0 25px rgba(255, 105, 180, 0.2);
        border-color: #ff6b81;
      }
      .menu-screen.show {
        opacity: 1;
        pointer-events: auto;
      }
      .menu-screen.show .menu-item {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .menu-screen.show .menu-item:nth-child(1) {
        transition-delay: 0.1s;
      }
      .menu-screen.show .menu-item:nth-child(2) {
        transition-delay: 0.2s;
      }
      .menu-screen.show .menu-item:nth-child(3) {
        transition-delay: 0.3s;
      }
      .menu-screen.show .menu-item:nth-child(4) {
        transition-delay: 0.4s;
      }
      .icon-bg {
        position: relative;
        width: 100px;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
      }
      .icon-bg::before {
        content: "";
        position: absolute;
        width: 100px;
        height: 100px;
        background: radial-gradient(
          circle,
          rgba(255, 107, 129, 0.8) 0%,
          rgba(255, 182, 193, 0.5) 40%,
          transparent 70%
        );
        border-radius: 50%;
        filter: blur(8px);
        transform: scale(1) translateY(5px);
        z-index: 1;
        transition: all 0.4s ease;
      }
      .menu-item:hover .icon-bg::before {
        transform: scale(1.5);
        filter: blur(12px);
        opacity: 0.8;
      }
      .icon-bg svg {
        position: relative;
        z-index: 2;
        width: 60px;
        height: 60px;
        overflow: visible;
      }
      @keyframes wobbleIcon {
        0% {
          transform: rotate(0deg) scale(1);
        }
        25% {
          transform: rotate(-15deg) scale(1.1);
        }
        50% {
          transform: rotate(10deg) scale(1.1);
        }
        75% {
          transform: rotate(-10deg) scale(1.1);
        }
        100% {
          transform: rotate(0deg) scale(1);
        }
      }
      .menu-item:hover .icon-bg svg {
        animation: wobbleIcon 0.6s ease-in-out;
      }
      .menu-item span {
        font-size: 24px;
        font-weight: 800;
        color: #5bc0de;
        text-transform: capitalize;
        letter-spacing: 1px;
        transition: color 0.3s;
      }
      .menu-item:hover span {
        color: #ff6b81;
      }

      /* ĐIỀU CHỈNH RIÊNG NÚT MUSIC MENU KHI PHÁT NHẠC */
      .music-menu-item.playing .icon-bg svg {
        animation: wobbleIcon 0.9s ease-in-out infinite;
      }
      .music-menu-item.playing span {
        color: #ff1493;
      }

      /* =========================================
         MÀN HÌNH CHỨC NĂNG CHUNG (OVERLAY)
         ========================================= */
      .feature-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 230, 238, 0.82);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 230;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .feature-overlay.show {
        opacity: 1;
      }
      .feature-close {
        position: absolute;
        top: 22px;
        right: 22px;
        width: 38px;
        height: 38px;
        border: none;
        border-radius: 50%;
        background: #ff1493;
        color: white;
        font-size: 20px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(255, 20, 147, 0.35);
        z-index: 5;
        transition: transform 0.25s ease;
      }
      .feature-close:hover {
        transform: scale(1.08) rotate(90deg);
      }

      /* =========================================
         BOX MUSIC PLAYER MỚI
         ========================================= */
      .music-box {
        position: relative;
        width: min(95vw, 840px); /* Phóng to Box Music */
        min-height: 380px;
        border-radius: 34px;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(255, 116, 156, 0.2),
            transparent 18%
          ),
          radial-gradient(
            circle at 80% 18%,
            rgba(216, 27, 96, 0.18),
            transparent 16%
          ),
          linear-gradient(
            145deg,
            rgba(255, 255, 255, 0.9),
            rgba(250, 229, 236, 0.8)
          );
        border: 4px solid rgba(255, 210, 226, 0.95);
        box-shadow:
          0 28px 70px rgba(131, 61, 86, 0.28),
          inset 0 0 0 2px rgba(255, 255, 255, 0.62);
        padding: 30px 40px;
        transform: translateY(30px) scale(0.86);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
      }
      .music-box::before,
      .music-box::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(3px);
        pointer-events: none;
      }
      .music-box::before {
        width: 96px;
        height: 96px;
        left: 120px;
        bottom: 52px;
        background: rgba(255, 58, 130, 0.14);
      }
      .music-box::after {
        width: 70px;
        height: 70px;
        right: 130px;
        top: 56px;
        background: rgba(255, 160, 184, 0.3);
      }
      .feature-overlay.show .music-box {
        transform: translateY(0) scale(1);
      }

      .music-player-title {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        color: #d81b60;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 25px;
      }
      .music-player-title::before {
        content: "🎧";
        width: 25px;
        height: 25px;
        border-radius: 50%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 5px 12px rgba(216, 27, 96, 0.14);
        font-size: 14px;
      }

      .music-player-layout {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 40px;
        align-items: center;
      }

      .now-playing-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 0;
      }
      .music-avatar {
        position: relative;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        padding: 6px;
        background: linear-gradient(135deg, #ffffff, #ff8eb3);
        box-shadow: 0 12px 28px rgba(216, 27, 96, 0.25);
        margin-bottom: 25px;
      }
      .music-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        display: block;
        /* HIỆU ỨNG XOAY ĐĨA THAN */
        animation: spinRecord 10s linear infinite;
        animation-play-state: paused; /* Mặc định dừng */
      }
      /* Kích hoạt xoay khi class playing được thêm vào music-box */
      .music-box.playing .music-avatar img {
        animation-play-state: running;
      }
      @keyframes spinRecord {
        100% {
          transform: rotate(360deg);
        }
      }

      .track-marquee {
        width: 100%;
        max-width: 250px;
        min-height: 25px;
        overflow: hidden;
        color: #e91e63;
        font-size: 20px;
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        margin-bottom: 15px;
      }
      .track-marquee span {
        display: inline-block;
      }

      .music-progress {
        width: 100%;
        max-width: 260px;
        margin-bottom: 20px;
      }
      .progress-time {
        display: flex;
        justify-content: space-between;
        color: #e91e63;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      /* THANH TUA NHẠC CÓ THỂ CLICK */
      .progress-rail {
        height: 6px;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: inset 0 1px 4px rgba(216, 27, 96, 0.12);
        cursor: pointer; /* Cho phép click */
        position: relative;
        overflow: hidden;
      }
      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff1493, #ff7aa8);
        transition: width 0.1s linear;
        pointer-events: none; /* Bỏ qua event để nhường cho thẻ mẹ rail */
      }

      .music-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 25px;
      }
      .music-skip-btn,
      .music-toggle-btn {
        border: none;
        cursor: pointer;
        color: #e91e63;
        font-family: "Quicksand", sans-serif;
        font-weight: 900;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease;
      }
      .music-skip-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: transparent;
        font-size: 32px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .music-skip-btn:hover {
        transform: scale(1.2);
      }

      /* Nút Play/Pause thiết kế mới */
      .music-toggle-btn {
        width: 60px;
        height: 60px;
        min-width: 60px;
        border-radius: 50%;
        background: #e91e63;
        color: white;
        font-size: 0;
        box-shadow: 0 12px 28px rgba(216, 27, 96, 0.34);
        position: relative;
      }
      .music-toggle-btn::before {
        content: "▶";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        padding-left: 3px;
      }
      .music-box.playing .music-toggle-btn::before {
        content: "Ⅱ";
        padding-left: 0;
        font-size: 22px;
      }
      .music-toggle-btn:hover {
        transform: translateY(-2px) scale(1.06);
        box-shadow: 0 15px 32px rgba(216, 27, 96, 0.42);
      }

      .playlist-panel {
        min-width: 0;
        max-height: 290px;
        padding-right: 15px;
        overflow-y: auto;
        scrollbar-color: #ff8eb3 rgba(255, 255, 255, 0.35);
        scrollbar-width: thin;
      }
      .playlist-panel::-webkit-scrollbar {
        width: 6px;
      }
      .playlist-panel::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.35);
        border-radius: 99px;
      }
      .playlist-panel::-webkit-scrollbar-thumb {
        background: #ff8eb3;
        border-radius: 99px;
      }

      .playlist-track {
        display: flex;
        align-items: center;
        gap: 15px;
        min-height: 60px;
        padding: 10px 15px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.62);
        box-shadow: 0 8px 18px rgba(117, 70, 87, 0.08);
        color: #d81b60;
        font-size: 14px;
        font-weight: 900;
        margin-bottom: 12px;
        cursor: pointer;
        transition:
          transform 0.22s ease,
          background 0.22s ease;
      }
      .playlist-track:hover,
      .playlist-track.active {
        transform: translateX(5px);
        background: rgba(245, 176, 198, 0.74);
      }
      .playlist-track img {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        object-fit: cover;
        flex: 0 0 auto;
      }
      .playlist-track span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* MÀN HÌNH ĐỌC THƯ (ENVELOPE & LETTER) */
      .letter-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 230, 238, 0.85);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 200;
      }
      .envelope-wrapper {
        position: relative;
        width: 320px;
        height: 220px;
        transition:
          opacity 0.5s,
          transform 0.5s;
        z-index: 201;
        animation:
          popUpEnvelope 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
          floatEnvelope 3s ease-in-out infinite 0.6s;
      }
      @keyframes popUpEnvelope {
        from {
          opacity: 0;
          transform: scale(0.5) translateY(50px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes floatEnvelope {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }
      .env-body {
        position: absolute;
        inset: 0;
        background: #ff89a3;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.6);
        box-shadow:
          0 0 40px rgba(255, 105, 180, 0.6),
          0 15px 35px rgba(255, 105, 180, 0.4);
        z-index: 1;
      }
      .env-front {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        border-radius: 12px;
        overflow: hidden;
      }
      .env-front::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        border-left: 160px solid #ff6b81;
        border-top: 110px solid transparent;
        border-bottom: 110px solid transparent;
      }
      .env-front::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        border-right: 160px solid #ff6b81;
        border-top: 110px solid transparent;
        border-bottom: 110px solid transparent;
      }
      .env-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-bottom: 110px solid #ff4757;
        z-index: 4;
        pointer-events: none;
      }
      .env-flap {
        position: absolute;
        top: 0;
        left: 0;
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-top: 130px solid #ff9a9e;
        transform-origin: top;
        transition: transform 0.6s ease-in-out;
        z-index: 5;
        filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.1));
      }
      .env-dummy-letter {
        position: absolute;
        bottom: 5%;
        left: 5%;
        width: 90%;
        height: 90%;
        background: #fffbf0;
        border-radius: 8px;
        z-index: 2;
        transition: transform 0.8s ease-in-out;
      }
      .env-seal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: #d81b60;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        cursor: pointer;
        z-index: 6;
        box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
        border: 2px solid #ffb6c1;
        transition: 0.3s;
      }
      .env-seal:hover {
        transform: translate(-50%, -50%) scale(1.1);
        background: #c2185b;
      }
      .env-seal svg {
        width: 20px;
        height: 20px;
        fill: white;
        margin-bottom: 3px;
      }
      .env-seal span {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .envelope-wrapper.open .env-flap {
        transform: rotateX(180deg);
        z-index: 1;
        filter: none;
      }
      .envelope-wrapper.open .env-seal {
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0);
      }
      .envelope-wrapper.open .env-dummy-letter {
        transform: translateY(-120px);
      }
      .reading-letter {
        position: absolute;
        width: 90vw;
        max-width: 550px;
        height: 85vh;
        max-height: 700px;
        background-color: #fffaf0;
        background-image:
          radial-gradient(
            circle at 15% 20%,
            rgba(255, 182, 193, 0.5) 0%,
            transparent 15%
          ),
          radial-gradient(
            circle at 85% 35%,
            rgba(255, 192, 203, 0.4) 0%,
            transparent 20%
          ),
          radial-gradient(
            circle at 75% 75%,
            rgba(255, 228, 225, 0.6) 0%,
            transparent 25%
          ),
          radial-gradient(
            circle at 25% 85%,
            rgba(144, 238, 144, 0.2) 0%,
            transparent 15%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 105, 180, 0.15) 0%,
            transparent 30%
          );
        border-radius: 20px;
        border: 4px solid #ffdde6;
        box-shadow: 0 20px 60px rgba(255, 105, 180, 0.25);
        padding: 50px 30px 80px 30px;
        z-index: 202;
        opacity: 0;
        transform: translateY(50px) scale(0.8);
        pointer-events: none;
        transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .reading-letter.show {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .close-reading {
        position: absolute;
        top: 15px;
        right: 15px;

        width: 32px;
        height: 32px;
        border-radius: 50%;

        justify-content: center;
        align-items: center;

      .top-left-decor {

      @keyframes spinSlow {
        100% {
          transform: rotate(360deg);

      .letter-content-scroll {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        padding-right: 5px;
        position: relative;
        z-index: 6;

          transform: translateY(-8px);

      /* ALBUM ẢNH & LIGHTBOX (NỀN TRONG SUỐT) */
      .image-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 220, 230, 0.6);
        backdrop-filter: blur(3px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 200;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .gallery-box {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 2px solid rgba(255, 255, 255, 0.8);
        border-radius: 20px;
        padding: 45px 10px 10px 10px;
        width: 90%;
        max-width: 500px;
        height: 75vh;
        max-height: 650px;
        box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
        display: flex;
        flex-direction: column;
        position: relative;
        transform: scale(0.8);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .image-overlay.show {
        opacity: 1;
      }
      .image-overlay.show .gallery-box {
        transform: scale(1);
      }
      .close-gallery {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff1493;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        border: 2px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 3px 10px rgba(255, 20, 147, 0.4);
        transition: 0.3s;
        z-index: 10;
      }
      .close-gallery:hover {
        transform: scale(1.1) rotate(90deg);
      }
      .close-gallery svg {
        width: 14px;
        height: 14px;
        fill: white;
      }
      .image-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        overflow-y: auto;
        padding-right: 2px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .image-grid::-webkit-scrollbar {
        display: none;
      }
      .grid-item {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .grid-item:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(255, 105, 180, 0.5);
        z-index: 2;
        position: relative;
        border-color: #ffffff;
      }

      /* LIGHTBOX & HIỆU ỨNG THẢ TIM */
      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(2px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 300;
      }
      .lightbox-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: zoomInImg 0.3s ease;
        position: relative;
      }
      #lightbox-img {
        max-width: 85vw;
        max-height: 75vh;
        border: 6px solid #ffffff;
        border-radius: 8px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        object-fit: contain;
      }
      @keyframes zoomInImg {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .close-lightbox {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 40px;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        z-index: 301;
      }
      .close-lightbox:hover {
        color: #ff1493;
        transform: scale(1.2);
      }
      .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 30px;
        color: white;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.6);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.3s;
        z-index: 301;
      }
      .nav-btn:hover {
        background: #ff1493;
        border-color: #fff;
      }
      .prev-btn {
        left: 25px;
      }
      .next-btn {
        right: 25px;
      }
      .heart-react-btn {
        margin-top: -25px;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(5px);
        border: 2px solid rgba(255, 255, 255, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.2s;
        z-index: 302;
        box-shadow: 0 5px 15px rgba(255, 20, 147, 0.5);
      }
      .heart-react-btn svg {
        width: 28px;
        height: 28px;
        fill: #ff1493;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        transition: 0.2s;
      }
      .heart-react-btn:hover {
        background: rgba(255, 20, 147, 0.2);
        border-color: #ff1493;
        transform: scale(1.1);
      }
      .heart-react-btn:hover svg {
        fill: #ff6b81;
        transform: scale(1.1);
      }
      .react-particle {
        position: fixed;
        pointer-events: none;
        font-size: 28px;
        z-index: 9999;
        animation: flyAndFade 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      }
      @keyframes flyAndFade {
        0% {
          transform: translate(-50%, -50%) scale(0.2);
          opacity: 1;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: translate(
              calc(-50% + var(--tx)),
              calc(-50% + var(--ty) + 150px)
            )
            scale(1.2) rotate(var(--rot));
          opacity: 0;
        }
      }

      /* =========================================
         CSS BÁNH KEM 3D (MẶT NẮP KHÍT & XOAY MƯỢT)
         ========================================= */
      .cake-3d-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        perspective: 2000px; /* Tăng chiều sâu 3D cho ảnh thực tế hơn */
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
      }

      .cake-drag-area {
        width: 100%;
        height: 60vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: grab;
        z-index: 50;
      }
      .cake-drag-area:active {
        cursor: grabbing;
      }

      .cake-container {
        position: relative;
        width: 0;
        height: 0; /* Đưa tâm về 0x0 để xoay chuẩn xác */
        transform-style: preserve-3d;
        transform: rotateX(-15deg) rotateY(0deg);
      }

      .cake-tier {
        position: absolute;
        left: 0;
        top: 0;
        transform-style: preserve-3d;
      }

      .cake-panel {
        position: absolute;
        background-size: cover;
        background-position: center;
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow:
          inset 0 0 10px rgba(0, 0, 0, 0.1),
          0 0 5px rgba(0, 0, 0, 0.2);
        backface-visibility: hidden;
      }

      .cake-face {
        position: absolute;
        border-radius: 50%;
        background-color: #ffdde6;
        background-size: cover;
        background-position: center;
        border: 3px solid #fff;
        backface-visibility: hidden;
      }

      .cake-candle {
        position: absolute;
        font-size: 50px;
        cursor: pointer;
        z-index: 100;
        filter: drop-shadow(0 0 15px #ff1493);
        animation: flicker 0.5s infinite alternate;
        transition: transform 0.2s;
      }
      /* Quan trọng: Phải dùng !important để hover nến to ra mà không bị ghi đè tọa độ */
      .cake-candle:hover {
        transform: scale(1.3) !important;
      }
      @keyframes flicker {
        0% {
          opacity: 0.8;
        }
        100% {
          opacity: 1;
        }
      }

      /* Khung bong bóng ảnh bay */
      .floating-memories {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0;
        display: none;
        z-index: 10;
      }
      .floating-memories.show {
        display: block;
        opacity: 1;
        pointer-events: auto;
      }

      .bubble-memory {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        border: 4px solid #fff;
        box-shadow: 0 10px 20px rgba(255, 105, 180, 0.4);
        cursor: pointer;
        transition: transform 0.3s;
        animation: floatBubble linear infinite;
      }
      .bubble-memory:hover {
        transform: scale(1.2);
        z-index: 100;
        border-color: #ff1493;
      }

      @keyframes floatBubble {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-120vh) scale(1);
          opacity: 0;
        }
      }

      /* =========================================
         HIỆU ỨNG HOA NỔ VÀ RƠI CÙNG TIN NHẮN
         ========================================= */
      .falling-flower {
        position: absolute;
        font-size: 65px; /* Kích thước bông hoa */
        filter: drop-shadow(0 4px 10px rgba(255, 105, 180, 0.5));
        animation: fallDownFlower 2.5s cubic-bezier(0.3, 0, 0.8, 1) forwards;
        pointer-events: none;
        z-index: 1000;
      }

      .falling-text {
        position: absolute;
        transform: translateX(-50%);
        color: #d81b60;
        font-family: "Dancing Script", cursive;
        font-size: 26px;
        font-weight: bold;
        background: rgba(255, 255, 255, 0.95);
        padding: 8px 20px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        white-space: nowrap;
        animation: fallDownText 2.5s cubic-bezier(0.3, 0, 0.8, 1) forwards;
        pointer-events: none;
        z-index: 1000;
      }

      @keyframes fallDownFlower {
        0% {
          transform: translateY(0) scale(1) rotate(0deg);
          opacity: 1;
        }
        10% {
          transform: translateY(-30px) scale(1.4) rotate(15deg);
          opacity: 1;
        } /* Nẩy lên và to ra như vụ nổ */
        100% {
          transform: translateY(100vh) scale(0.8) rotate(180deg);
          opacity: 0;
        } /* Rơi rụng xuống */
      }

      @keyframes fallDownText {
        0% {
          transform: translate(-50%, 0) scale(0.5);
          opacity: 0;
        }
        10% {
          transform: translate(-50%, -10px) scale(1.1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, 100vh) scale(0.9);
          opacity: 0;
        }
      }
    </style>

    <script>
      // =========================================
      // 1. DATA: DANH SÁCH BÀI HÁT (THAY LINK BẠN TẠI ĐÂY)
      // =========================================
      const myPlaylist = [
        {
          title: "Hôm nay là ngày duy nhất!",
          src: "homnaylangayduynhat.mp4",
          img: "DUNG1.jpg",
          duration: "00:25",
        },
        {
          title: "Mừng ngày sinh nhật",
          src: "mungngaysinhnhat.mp4", // Đổi tên file thật của bạn vào đây
          img: "dung2.jpg",
          duration: "00:24",
        },
        {
          title: "Đêm nay sao trời,...",
          src: "demnaysaotroi.mp4",
          img: "dung3.jpg",
          duration: "00:31",
        },
        {
          title: "Cộng thêm số của tuổi đời =))",
          src: "congthemsocuatuoidoi.mp4",
          img: "dung4.jpg",
          duration: "00:26",
        },
        {
          title: "HAPPY BIRTHDAY TO DUNGGG",
          src: "HPBD.mp4",
          img: "dung5.jpg",
          duration: "00:20",
        },
      ];

      // =========================================
      // 2. LOGIC MUSIC PLAYER
      // =========================================
      let currentTrackIdx = 1; // Mặc định mở bài số 2
      let musicStarted = false;
      const bgAudio = document.getElementById("bgMusic");
      bgAudio.preload = "auto";
      bgAudio.playsInline = true;
      const mAvatar = document.getElementById("music-player-avatar");
      const mTitle = document.getElementById("music-track-title");
      const mTimeCur = document.getElementById("music-time-current");
      const mTimeTot = document.getElementById("music-time-total");
      const mProgFill = document.getElementById("music-progress-fill");
      const mProgRail = document.getElementById("music-progress-rail");
      const pContainer = document.getElementById("playlist-container");
      const mBox = document.getElementById("music-box");
      const mToggleBtn = document.getElementById("music-toggle-btn");
      const musicMenuIcon = document.querySelector(".music-menu-item");

      // Tự động phát nhạc khi click vào màn hình lần đầu
      document.body.addEventListener(
        "click",
        function () {
          if (!musicStarted) {
            bgAudio.volume = 0.5;
            bgAudio
              .play()
              .then(() => {
                musicStarted = true;
                syncMusicUI(true);
              })
              .catch((e) => console.log("Blocked autplay"));
          }
        },
        { once: true },
      );

      function renderPlaylist() {
        pContainer.innerHTML = "";
        myPlaylist.forEach((track, index) => {
          const div = document.createElement("div");
          div.className = `playlist-track ${index === currentTrackIdx ? "active" : ""}`;
          div.onclick = (e) => {
            e.stopPropagation();
            playSpecificTrack(index);
          };
          div.innerHTML = `<img src="${track.img}" alt="cover"/> <span>${track.title}</span>`;
          pContainer.appendChild(div);
        });
      }

      function loadTrack(index) {
        currentTrackIdx = index;
        const track = myPlaylist[index];
        bgAudio.pause();

        bgAudio.src = track.src;

        bgAudio.load();
        mAvatar.src = track.img;
        mTitle.innerHTML = `<span>${track.title}</span>`;
        mTimeTot.innerText = track.duration;
        mTimeCur.innerText = "0:00";
        mProgFill.style.width = "0%";

        // Active item trong playlist
        if (pContainer.hasChildNodes()) {
          pContainer.querySelectorAll(".playlist-track").forEach((item, i) => {
            item.classList.toggle("active", i === index);
          });
        }
      }

      function syncMusicUI(isPlaying) {
        mBox.classList.toggle("playing", isPlaying);
        musicMenuIcon.classList.toggle("playing", isPlaying);
      }

      async function playSpecificTrack(index) {
        loadTrack(index);

        try {
          await bgAudio.play();

          syncMusicUI(true);
        } catch (err) {
          console.log(err);
        }
      }

      async function togglePlay(e) {
        if (e) e.stopPropagation();

        try {
          if (bgAudio.paused) {
            await bgAudio.play();

            syncMusicUI(true);
          } else {
            bgAudio.pause();

            syncMusicUI(false);
          }
        } catch (err) {
          console.log("Play blocked:", err);

          alert("Hãy chạm vào màn hình một lần nữa để bật nhạc.");
        }
      }

      function skipTrack(step, e) {
        if (e) e.stopPropagation();
        let newIdx = currentTrackIdx + step;
        if (newIdx >= myPlaylist.length) newIdx = 0;
        if (newIdx < 0) newIdx = myPlaylist.length - 1;
        playSpecificTrack(newIdx);
      }

      // Xử lý thanh tiến trình (Progress/Seek)
      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? "0" : ""}${s}`;
      }
      bgAudio.addEventListener("timeupdate", () => {
        if (bgAudio.duration) {
          const percent = (bgAudio.currentTime / bgAudio.duration) * 100;
          mProgFill.style.width = `${percent}%`;
          mTimeCur.innerText = formatTime(bgAudio.currentTime);
        }
      });
      mProgRail.addEventListener("click", (e) => {
        if (!bgAudio.duration) return;
        const rect = mProgRail.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percent = clickX / rect.width;
        bgAudio.currentTime = percent * bgAudio.duration;
      });
      bgAudio.addEventListener("ended", () => skipTrack(1));

      // Mở Đóng Modal Music
      function showMusicBox(e) {
        if (e) e.stopPropagation();
        document.getElementById("music-overlay").style.display = "flex";
        setTimeout(
          () => document.getElementById("music-overlay").classList.add("show"),
          10,
        );
        if (!pContainer.hasChildNodes()) {
          renderPlaylist();
          loadTrack(currentTrackIdx);
        }
      }
      function closeMusicBox() {
        document.getElementById("music-overlay").classList.remove("show");
        setTimeout(
          () =>
            (document.getElementById("music-overlay").style.display = "none"),
          300,
        );
      }

      // =========================================
      // 3. MẬT KHẨU
      // =========================================
      const CORRECT_PIN = "1901";
      let currentPin = "";
      const dots = document.querySelectorAll(".dot");
      const lockCard = document.getElementById("lock-card");
      const menuScreen = document.getElementById("menu-screen");

      function updateDots() {
        dots.forEach((dot, index) => {
          if (index < currentPin.length) dot.classList.add("active");
          else dot.classList.remove("active");
        });
      }
      function addNumber(num) {
        if (currentPin.length < 4) {
          currentPin += num;
          updateDots();
          if (currentPin.length === 4) setTimeout(checkPin, 300);
        }
      }
      function deleteNumber() {
        if (currentPin.length > 0) {
          currentPin = currentPin.slice(0, -1);
          updateDots();
        }
      }
      function checkPin() {
        if (currentPin === CORRECT_PIN) {
          bgAudio
            .play()
            .then(() => {
              bgAudio.pause();

              bgAudio.currentTime = 0;
            })
            .catch(() => {});
          lockCard.style.opacity = "0";
          lockCard.style.transform = "scale(0.5) rotate(-5deg)";
          setTimeout(() => {
            lockCard.style.display = "none";
            menuScreen.classList.add("show");
            setTimeout(fireConfetti, 400);
          }, 600);
        } else {
          lockCard.classList.add("shake");
          setTimeout(() => {
            lockCard.classList.remove("shake");
            currentPin = "";
            updateDots();
            showHint();
          }, 400);
        }
      }

      // =========================================
      // 4. CÁC TÍNH NĂNG KHÁC (Pháo, Cào, Đọc thư, Ảnh)
      // =========================================
      function fireConfetti() {
        var duration = 2.5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = {
          startVelocity: 30,
          spread: 360,
          ticks: 60,
          zIndex: 100,
        };
        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }
        var interval = setInterval(function () {
          var timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) {
            return clearInterval(interval);
          }
          var particleCount = 50 * (timeLeft / duration);
          confetti(
            Object.assign({}, defaults, {
              particleCount,
              origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
            }),
          );
          confetti(
            Object.assign({}, defaults, {
              particleCount,
              origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
            }),
          );
        }, 250);
      }

      function burstHearts(e) {
        const btn = e.currentTarget;
        btn.style.transform = "scale(0.7)";
        setTimeout(() => (btn.style.transform = "scale(1.1)"), 150);
        setTimeout(() => (btn.style.transform = "scale(1)"), 300);
        const emojis = ["💖", "🌸", "✨", "🎀", "🥰", "🎁", "💗"];
        const rect = btn.getBoundingClientRect();
        const originX = rect.left + rect.width / 2;
        const originY = rect.top + rect.height / 2;
        for (let i = 0; i < 50; i++) {
          const particle = document.createElement("div");
          particle.className = "react-particle";
          particle.innerText =
            emojis[Math.floor(Math.random() * emojis.length)];
          document.body.appendChild(particle);
          const angle = Math.random() * Math.PI * 2;
          const velocity = 80 + Math.random() * 200;
          const tx = Math.cos(angle) * velocity;
          const ty = Math.sin(angle) * velocity - 100;
          const rot = (Math.random() - 0.5) * 360;
          particle.style.left = originX + "px";
          particle.style.top = originY + "px";
          particle.style.setProperty("--tx", `${tx}px`);
          particle.style.setProperty("--ty", `${ty}px`);
          particle.style.setProperty("--rot", `${rot}deg`);
          setTimeout(() => {
            particle.remove();
          }, 2000);
        }
      }

      const canvas = document.getElementById("scratch-pad");
      const ctx = canvas.getContext("2d");
      let isDrawing = false;
      function initScratchCard() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.globalCompositeOperation = "source-over";
        let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, "#ff89a3");
        gradient.addColorStop(1, "#ff5b7f");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "700 20px 'Quicksand', sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Cào để xem", canvas.width / 2, canvas.height / 2 + 2);
        ctx.globalCompositeOperation = "destination-out";
      }
      function showHint() {
        document.getElementById("hint-overlay").style.display = "flex";
        document.fonts.ready.then(function () {
          initScratchCard();
        });
      }
      function closeHint() {
        document.getElementById("hint-overlay").style.display = "none";
      }
      function startPosition(e) {
        isDrawing = true;
        scratch(e);
      }
      function endPosition() {
        isDrawing = false;
        ctx.beginPath();
      }
      function scratch(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        let x, y;
        if (e.type.includes("touch")) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        }
        ctx.lineWidth = 30;
        ctx.lineCap = "round";
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      }
      canvas.addEventListener("mousedown", startPosition);
      canvas.addEventListener("mouseup", endPosition);
      canvas.addEventListener("mousemove", scratch);
      canvas.addEventListener("touchstart", startPosition, { passive: false });
      canvas.addEventListener("touchend", endPosition);
      canvas.addEventListener("touchmove", scratch, { passive: false });

      const envelopeWrapper = document.getElementById("envelope-wrapper");
      const readingLetter = document.getElementById("reading-letter");
      const letterContent = document.getElementById("typewriter-text");
      const scrollContainer = document.getElementById("scroll-container");
      const secretMessage = `Gửi người con gái anh yêu, 🌸\n\nHôm nay là một ngày thật đặc biệt, bởi đó là ngày một thiên thần đã chào đời.\n\nChúc em bước sang tuổi mới luôn rạng rỡ, xinh đẹp và ngập tràn hạnh phúc.\n\nCảm ơn em vì đã luôn ở bên cạnh, mang đến cho anh những khoảnh khắc vô cùng ấm áp và ý nghĩa. Em chính là món quà tuyệt vời nhất mà cuộc sống này đã dành tặng cho anh.\n\nSinh nhật vui vẻ nhé, cô gái của anh! Yêu em nhiều! ❤️🎂🎁`;
      let typewriterTimer;
      let charIndex = 0;
      function showLetterOverlay() {
        const overlay = document.getElementById("letter-overlay");
        overlay.style.display = "flex";
        overlay.style.opacity = "0";
        setTimeout(() => {
          overlay.style.opacity = "1";
          overlay.style.transition = "opacity 0.3s ease";
        }, 10);
        envelopeWrapper.classList.remove("open");
        envelopeWrapper.style.display = "block";
        envelopeWrapper.style.opacity = "1";
        envelopeWrapper.style.transform = "";
        envelopeWrapper.style.animation = "none";
        envelopeWrapper.offsetHeight;
        envelopeWrapper.style.animation = null;
        readingLetter.classList.remove("show");
        letterContent.innerHTML = "";
        charIndex = 0;
        clearTimeout(typewriterTimer);
      }
      function openEnvelope() {
        envelopeWrapper.classList.add("open");
        envelopeWrapper.style.animation = "none";
        setTimeout(() => {
          envelopeWrapper.style.opacity = "0";
          envelopeWrapper.style.transform = "scale(0.8)";
          setTimeout(() => {
            envelopeWrapper.style.display = "none";
            readingLetter.classList.add("show");
            setTimeout(typeWriterEffect, 600);
          }, 500);
        }, 1000);
      }
      function typeWriterEffect() {
        if (charIndex < secretMessage.length) {
          const char = secretMessage.charAt(charIndex);
          letterContent.innerHTML += char === "\n" ? "<br>" : char;
          charIndex++;
          scrollContainer.scrollTop = scrollContainer.scrollHeight;
          typewriterTimer = setTimeout(typeWriterEffect, 40);
        }
      }
      function closeLetter() {
        document.getElementById("letter-overlay").style.display = "none";
        clearTimeout(typewriterTimer);
      }

      const myGallery = [
        "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=500&q=80",
      ];
      let currentImgIndex = 0;
      function showGallery() {
        const overlay = document.getElementById("image-overlay");
        const grid = document.getElementById("image-grid");
        if (grid.children.length === 0) {
          myGallery.forEach((src, index) => {
            let img = document.createElement("img");
            img.src = src;
            img.className = "grid-item";
            img.onclick = () => openLightbox(index);
            grid.appendChild(img);
          });
        }
        overlay.style.display = "flex";
        setTimeout(() => overlay.classList.add("show"), 10);
      }
      function closeGallery() {
        const overlay = document.getElementById("image-overlay");
        overlay.classList.remove("show");
        setTimeout(() => (overlay.style.display = "none"), 300);
      }
      function openLightbox(index) {
        currentImgIndex = index;
        document.getElementById("lightbox-img").src =
          myGallery[currentImgIndex];
        document.getElementById("lightbox").style.display = "flex";
      }
      function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
      }
      function changeImage(step) {
        currentImgIndex += step;
        if (currentImgIndex >= myGallery.length) currentImgIndex = 0;
        if (currentImgIndex < 0) currentImgIndex = myGallery.length - 1;
        const imgElement = document.getElementById("lightbox-img");
        imgElement.style.animation = "none";
        imgElement.offsetHeight;
        imgElement.src = myGallery[currentImgIndex];
        imgElement.style.animation = "zoomInImg 0.3s ease";
      }

      // =========================================
      // LOGIC BÁNH KEM 3D & BONG BÓNG ẢNH
      // =========================================

      // Dữ liệu: Mảng chứa Link ảnh và Lời chúc tương ứng (Bạn tự thay link ảnh và text nhé)
      const myMemories = [
        {
          src: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=200",
          text: "Nụ cười tỏa nắng ✨",
        },
        {
          src: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200",

        },
        {
          src: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200",
          text: "Kỷ niệm đáng nhớ 🥰",
        },
        {
          src: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200",
          text: "I love you 3000 ❤️",

        {

        },
        {

      function build3DCake() {
        const topTier = document.getElementById("tier-top");
        const bottomTier = document.getElementById("tier-bottom");
        topTier.innerHTML = "";
        bottomTier.innerHTML = "";

        const numPanels = myMemories.length; // Tổng số ảnh (mặc định là 10)
        const angle = 360 / numPanels;

        // KÍCH THƯỚC BÁNH (Đã phóng to hơn giống mẫu)
        const wBottom = 120;
        const hBottom = 160;
        const wTop = 85;
        const hTop = 115;

        // Toán học tính bán kính đường tròn nội tiếp để ảnh khớp nhau không bị hở
        const rBottom =
          Math.round(wBottom / 2 / Math.tan(Math.PI / numPanels)) - 1;
        const rTop = Math.round(wTop / 2 / Math.tan(Math.PI / numPanels)) - 1;

        // Nâng tầng trên lên đặt vừa khít trên nắp tầng dưới
        topTier.style.transform = `translateY(-${hBottom / 2 + hTop / 2}px)`;

        // Vòng lặp ghép các bức ảnh thành thân bánh
        myMemories.forEach((mem, i) => {
          let pB = document.createElement("div");
          pB.className = "cake-panel";
          pB.style.width = `${wBottom}px`;
          pB.style.height = `${hBottom}px`;
          pB.style.left = `50%`;
          pB.style.top = `50%`;
          pB.style.marginLeft = `${-wBottom / 2}px`;
          pB.style.marginTop = `${-hBottom / 2}px`;
          pB.style.backgroundImage = `url(${mem.src})`;
          pB.style.transform = `rotateY(${i * angle}deg) translateZ(${rBottom}px)`;
          bottomTier.appendChild(pB);

          let pT = document.createElement("div");
          pT.className = "cake-panel";
          pT.style.width = `${wTop}px`;
          pT.style.height = `${hTop}px`;
          pT.style.left = `50%`;
          pT.style.top = `50%`;
          pT.style.marginLeft = `${-wTop / 2}px`;
          pT.style.marginTop = `${-hTop / 2}px`;
          pT.style.backgroundImage = `url(${myMemories[numPanels - 1 - i].src})`;
          pT.style.transform = `rotateY(${i * angle}deg) translateZ(${rTop}px)`;
          topTier.appendChild(pT);
        });

        // Hàm tạo mặt nắp/đáy đậy kín bánh
        function createFace(tier, radius, height, isTop, imgUrl) {
          let face = document.createElement("div");
          face.className = "cake-face";
          // Tính bán kính đường tròn ngoại tiếp để nắp che kín hết mọi góc cạnh
          const circumRadius = radius / Math.cos(Math.PI / numPanels);
          const faceSize = circumRadius * 2;

          face.style.width = `${faceSize}px`;
          face.style.height = `${faceSize}px`;
          face.style.left = `50%`;
          face.style.top = `50%`;
          face.style.marginLeft = `${-faceSize / 2}px`;
          face.style.marginTop = `${-faceSize / 2}px`;

          const rot = isTop ? 90 : -90;
          const z = height / 2 - 1; // Lùi lại 1px để viền ảnh không bị đâm xuyên qua nắp
          face.style.transform = `rotateX(${rot}deg) translateZ(${z}px)`;
          face.style.backgroundImage = `url(${imgUrl})`;
          tier.appendChild(face);
        }

        // Tạo nắp và đáy cho 2 tầng
        createFace(bottomTier, rBottom, hBottom, true, myMemories[0].src);
        createFace(bottomTier, rBottom, hBottom, false, "");
        createFace(topTier, rTop, hTop, true, myMemories[2].src);
        createFace(topTier, rTop, hTop, false, "");

        // Gắn nến đứng chuẩn trên đỉnh cao nhất
        const candle = document.querySelector(".cake-candle");
        candle.style.left = "50%";
        candle.style.top = "50%";
        candle.style.marginLeft = "-25px"; // Lùi lại 1 nửa chiều rộng nến
        candle.style.marginTop = `-${hBottom / 2 + hTop + 35}px`; // Đẩy lên đỉnh tầng trên
      }

      function showGiftBox() {
        document.getElementById("gift-overlay").style.display = "flex";
        setTimeout(
          () => document.getElementById("gift-overlay").classList.add("show"),
          10,
        );

        // Reset lại trạng thái bánh kem
        document.getElementById("cake-3d-stage").style.display = "flex";
        document.getElementById("cake-3d-stage").style.opacity = "1";
        document.getElementById("cake-3d-stage").style.transform = "scale(1)";
        document.getElementById("floating-memories").classList.remove("show");
        document.getElementById("floating-memories").innerHTML = ""; // Xóa bong bóng cũ

        build3DCake();
      }

      function closeGiftBox() {
        document.getElementById("gift-overlay").classList.remove("show");
        setTimeout(
          () =>
            (document.getElementById("gift-overlay").style.display = "none"),
          300,
        );
      }

      function explodeCake() {
        // Nổ pháo giấy
        fireConfetti();

        // Làm mờ và ẩn bánh kem
        const cakeStage = document.getElementById("cake-3d-stage");
        cakeStage.style.opacity = "0";
        cakeStage.style.transform = "scale(0.5)";

        setTimeout(() => {
          cakeStage.style.display = "none";

          // Hiển thị khung bong bóng
          const floatContainer = document.getElementById("floating-memories");
          floatContainer.classList.add("show");

          // Tạo bong bóng bay lên
          myMemories.forEach((mem, i) => {
            // Lặp lại 2 lần để có nhiều bong bóng hơn
            for (let j = 0; j < 2; j++) {
              let bubble = document.createElement("div");
              bubble.className = "bubble-memory";
              bubble.style.backgroundImage = `url(${mem.src})`;

              const size = 60 + Math.random() * 60;
              bubble.style.width = `${size}px`;
              bubble.style.height = `${size}px`;
              bubble.style.left = `${Math.random() * 80 + 5}%`;

              // ĐÃ SỬA: Tăng tốc độ bay lên rất nhanh (Chỉ từ 3s đến 6s)
              bubble.style.animationDuration = `${3 + Math.random() * 3}s`;
              // ĐÃ SỬA: Xuất hiện dồn dập hơn
              bubble.style.animationDelay = `${Math.random() * 2}s`;

              // ĐÃ SỬA: Đổi sự kiện khi click vào bong bóng
              bubble.onclick = (e) => burstBubble(e, mem.text, bubble);

              floatContainer.appendChild(bubble);
            }
          });
        }, 500);
      }

      // =========================================
      // LOGIC XOAY BÁNH KEM 360 ĐỘ (TOUCH & MOUSE)
      // =========================================
      const dragArea = document.getElementById("cake-drag-area");
      const cakeContainer = document.getElementById("cake-container");

      let isDraggingCake = false;
      let previousX = 0,
        previousY = 0;
      let currentRotX = -15,
        currentRotY = 0; // Góc mặc định ban đầu

      // --- CHO MÁY TÍNH (MOUSE) ---
      dragArea.addEventListener("mousedown", (e) => {
        isDraggingCake = true;
        previousX = e.clientX;
        previousY = e.clientY;
      });
      window.addEventListener("mouseup", () => (isDraggingCake = false));
      window.addEventListener("mousemove", (e) => {
        if (!isDraggingCake) return;
        const deltaX = e.clientX - previousX;
        const deltaY = e.clientY - previousY;

        currentRotY += deltaX * 0.6; // Kéo ngang -> Xoay quanh trục Y
        currentRotX -= deltaY * 0.6; // Kéo dọc -> Xoay quanh trục X

        // Giới hạn góc lật lên xuống để bánh không bị lộn ngược hoàn toàn (Tùy chọn)
        currentRotX = Math.max(-80, Math.min(80, currentRotX));

        cakeContainer.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
        previousX = e.clientX;
        previousY = e.clientY;
      });

      // --- CHO ĐIỆN THOẠI (TOUCH) ---
      dragArea.addEventListener(
        "touchstart",
        (e) => {
          isDraggingCake = true;
          previousX = e.touches[0].clientX;
          previousY = e.touches[0].clientY;
        },
        { passive: false },
      );

      window.addEventListener("touchend", () => (isDraggingCake = false));
      window.addEventListener(
        "touchmove",
        (e) => {
          if (!isDraggingCake) return;
          const deltaX = e.touches[0].clientX - previousX;
          const deltaY = e.touches[0].clientY - previousY;

          currentRotY += deltaX * 0.8;
          currentRotX -= deltaY * 0.8;
          currentRotX = Math.max(-80, Math.min(80, currentRotX));

          cakeContainer.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
          previousX = e.touches[0].clientX;
          previousY = e.touches[0].clientY;
        },
        { passive: false },
      );

      // HÀM MỚI: Xử lý biến thành hoa nổ và rơi tin nhắn
      function burstBubble(e, text, bubble) {
        e.stopPropagation();

        // 1. Lấy tọa độ của bong bóng khi bị click
        const rect = bubble.getBoundingClientRect();
        const startX = rect.left;
        const startY = rect.top;
        const size = rect.width;

        // 2. Xóa bong bóng ảnh
        bubble.remove();

        // 3. Hiệu ứng nổ pháo giấy nhỏ xíu tại đúng vị trí click
        if (typeof confetti === "function") {
          confetti({
            particleCount: 20,
            spread: 60,
            origin: {
              x: (startX + size / 2) / window.innerWidth,
              y: (startY + size / 2) / window.innerHeight,
            },
            zIndex: 1000,
            colors: ["#ff1493", "#ffb6c1", "#ffffff"],
          });
        }

        const floatContainer = document.getElementById("floating-memories");

        // 4. Sinh ra bông hoa
        const flower = document.createElement("div");
        flower.className = "falling-flower";
        flower.innerText = "🌸"; // Bạn có thể thay bằng emoji hoa khác 🌺 🌻 🌹
        flower.style.left = `${startX + size / 2 - 32}px`; // Căn giữa vị trí nổ
        flower.style.top = `${startY}px`;
        floatContainer.appendChild(flower);

        // 5. Sinh ra tin nhắn rơi cùng
        const msg = document.createElement("div");
        msg.className = "falling-text";
        msg.innerText = text;
        msg.style.left = `${startX + size / 2}px`;
        msg.style.top = `${startY + 60}px`;
        floatContainer.appendChild(msg);

        // 6. Xóa cả 2 khỏi DOM sau khi rơi xong (2.5 giây)
        setTimeout(() => {
          flower.remove();
          msg.remove();
        }, 2500);
      }
      // Xử lý Tooltip Text khi click ảnh tròn
      let tooltipTimeout;
      function showMemoryText(e, text) {
        e.stopPropagation();
        const tooltip = document.getElementById("memory-tooltip");
        tooltip.innerText = text;

        // Đặt vị trí text ngay tại con trỏ chuột
        tooltip.style.left = `${e.clientX}px`;
        tooltip.style.top = `${e.clientY}px`;

        tooltip.classList.add("show");

        // Ẩn sau 2.5 giây
        clearTimeout(tooltipTimeout);
        tooltipTimeout = setTimeout(() => {
          tooltip.classList.remove("show");
        }, 2500);
      }
